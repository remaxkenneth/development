<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Listings | Kenneth Gehlhoff – RE/MAX Cabo Sanctuary</title>

  <!-- SEO -->
  <meta name="description" content="Luxury homes and land opportunities across Baja California Sur with RE/MAX Cabo Sanctuary.">

  <!-- OPEN GRAPH / META -->
  <meta property="og:title" content="Baja Listings – RE/MAX Cabo Sanctuary">
  <meta property="og:description" content="Homes and land across Baja Sur. Curated locally.">
  <meta property="og:image" content="https://remaxkenneth.com/images/sunsetcerritos.jpeg">
  <meta property="og:url" content="https://remaxkenneth.com/listings.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://remaxkenneth.com/listings.html">

  <!-- Performance: preload hero background -->
  <link rel="preload" as="image" href="images/sunsetcerritos.jpeg">

  <style>
    :root {
      --remax-blue: #003da5;
      --remax-red: #e4002b;
      --remax-dark-blue: #000E35;

      --text-main: rgba(255,255,255,0.92);
      --text-muted: rgba(255,255,255,0.70);

      --glass-bg: rgba(255,255,255,0.10);
      --glass-border: rgba(255,255,255,0.18);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(
          circle at top,
          #0f172a 0%,
          #0a0f1f 35%,
          #05070d 70%,
          #020409 100%
        );
      color: var(--text-main);
    }

    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }

    /* ================= HEADER ================= */

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(245,246,247,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #e5e7eb;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 5%;
      position: relative;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ONLY logo clickable */
    .nav-left a {
      display: inline-flex;
      align-items: center;
    }

    .nav-left img { height: 32px; }

    /* toolbar text BLACK */
    .nav-left span {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #000;
      text-transform: uppercase;
    }

    /* hamburger BLACK */
    .menu-button {
      font-size: 30px;
      cursor: pointer;
      color: #000;
      user-select: none;
      line-height: 1;
    }

    .menu-panel {
      position: absolute;
      right: 18px;
      top: 64px;

      background: rgba(255,255,255,0.80);
      backdrop-filter: blur(20px);
      border-radius: 22px;
      padding: 22px;
      min-width: 190px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      gap: 16px;

      opacity: 0;
      pointer-events: none;
      transform: scale(0.95);
      transition: 0.25s ease;

      color: #000;
    }

    body.menu-open .menu-panel {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    .menu-panel a {
      font-size: 14px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #000;
    }

    /* ================= HERO ================= */

    #hero {
      position: relative;
      min-height: 340px;
      display: flex;
      align-items: center;
      background: url('images/sunsetcerritos.jpeg') center/cover no-repeat;
      color: #fff;
    }

    #hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(130deg, rgba(0,14,53,0.65), rgba(0,0,0,0.25));
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      width: 92%;
      margin: auto;
    }

    .hero-eyebrow {
      letter-spacing: 0.35em;
      font-size: 0.7rem;
      opacity: 0.9;
      text-transform: uppercase;
      color: #e5e7eb;
    }

    .hero-title {
      font-size: 2.6rem;
      margin: 14px 0;
      font-weight: 600;
      line-height: 1.1;
    }

    .hero-sub {
      max-width: 560px;
      color: #e5e7eb;
    }

    /* ================= LISTINGS ================= */

    .section {
      max-width: 1200px;
      width: 92%;
      margin: 70px auto;
    }

    /* Key fix: cards never stretch full width when there’s 1 item */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 360px));
      gap: 32px;
      justify-content: center; /* centers leftover space */
    }

    /* invisible separator that forces "land" to start on a new row, without labels/lines */
    .group-break {
      grid-column: 1 / -1;
      height: 18px;
    }

    .card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 26px;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      display: block;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
    }

    .card-media {
      width: 100%;
      height: 240px;
      overflow: hidden;
      border-bottom: 1px solid rgba(255,255,255,0.10);
    }

    /* slightly less brutal crop for “weird” photos */
    .card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transform: scale(1.03);
    }

    .card-content {
      padding: 30px 26px;
      text-align: center;
    }

    .card h3 {
      margin: 0 0 10px;
      color: var(--text-main);
      font-weight: 600;
    }

    .card p {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.4;
      margin: 0;
    }

    footer {
      text-align: center;
      padding: 40px 0;
      font-size: 0.8rem;
      color: #aaa;
    }
  </style>
</head>

<body>

<header>
  <div class="nav">
    <div class="nav-left">
      <a href="index.html" aria-label="RE/MAX Home">
        <img src="images/logo.png" alt="RE/MAX">
      </a>
      <span>KENNETH GEHLHOFF</span>
    </div>

    <div
      class="menu-button"
      id="menuButton"
      role="button"
      tabindex="0"
      aria-label="Open menu"
      aria-controls="menuPanel"
      aria-expanded="false"
    >≡</div>

    <div class="menu-panel" id="menuPanel" role="menu" aria-label="Site menu">
      <a href="index.html" role="menuitem">Home</a>
      <a href="listings.html" role="menuitem">Listings</a>
      <a href="events.html" role="menuitem">Events</a>
      <a href="businesscard.html" role="menuitem">Contact</a>
    </div>
  </div>
</header>

<section id="hero">
  <div class="hero-inner">
    <div class="hero-eyebrow">Homes · Condos · Land · Investment</div>
    <h1 class="hero-title">Available Properties</h1>
    <p class="hero-sub">Curated for lifestyle, location, and value</p>
  </div>
</section>

<section class="section">
  <div class="grid" id="listingsGrid"></div>
</section>

<footer>
  Curated locally. Updated often.<br>
  © 2025 · RE/MAX Kenneth<br>
  Each office independently owned and operated
</footer>

<script>
(function(){
  // ================= MENU =================
  const btn = document.getElementById("menuButton");
  const panel = document.getElementById("menuPanel");

  function setExpanded(isOpen){ btn.setAttribute("aria-expanded", String(isOpen)); }
  function openMenu(){ document.body.classList.add("menu-open"); setExpanded(true); }
  function closeMenu(){ document.body.classList.remove("menu-open"); setExpanded(false); }
  function toggleMenu(){
    document.body.classList.contains("menu-open") ? closeMenu() : openMenu();
  }

  btn.addEventListener("click", e => { e.stopPropagation(); toggleMenu(); });
  btn.addEventListener("keydown", e => {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleMenu(); }
  });
  document.addEventListener("click", () => closeMenu());
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeMenu(); });
  panel.addEventListener("click", e => e.stopPropagation());

  // ================= LISTINGS DATA (EDIT HERE) =================
  // type: "home" or "land"
  // price: NUMBER (no commas)
  const listings = [
    {
      type: "home",
      name: "Casa Sol y Luna",
      href: "listings/1/index.html",
      img: "images/IMG_0795.jpeg",
      alt: "Casa Sol y Luna",
      price: 1300000,
      line1: "House",
      line2: "5 Bedrooms · 5 Bathrooms",
      line3: "Gavilan, B.C.S., Mexico"
    },
    {
      type: "home",
      name: "Casa Vista",
      href: "listings/2/index.html",
      img: "images/IMG_0822.png",
      alt: "Casa Vista",
      price: 749000,
      line1: "House",
      line2: "5 Bedrooms · 4 Bathrooms",
      line3: "Cerritos, Mexico"
    },
    {
      type: "home",
      name: "Casa Costa",
      href: "listings/5/index.html",
      img: "https://ldepvcutqiyf3cw0.public.blob.vercel-storage.com/5/hero.jpeg",
      alt: "Casa Costa",
      price: 649000,
      line1: "House",
      line2: "2 Bedrooms · 2 Bathrooms",
      line3: "Cerritos, Mexico"
    },
    {
      type: "home",
      name: "Casa Lienzo C. Molusco",
      href: "listings/3/index.html",
      img: "images/IMG_0797.png",
      alt: "Casa Lienzo C. Molusco",
      price: 395000,
      line1: "House",
      line2: "3 Bedrooms · 2 Bathrooms",
      line3: "Las Tunas, Mexico"
    },
    {
      type: "land",
      name: "Central Cerritos Lot",
      href: "listings/4/index.html",
      img: "images/IMG_0798.jpeg",
      alt: "Central Cerritos Lot",
      price: 265000,
      line1: "Plot of Land",
      line2: "Ocean View · Cul-de-Sac",
      line3: "Cerritos, Mexico"
    }
  ];

  // ================= RENDER =================
  const grid = document.getElementById("listingsGrid");

  const money = (n) => {
    try {
      return new Intl.NumberFormat("en-US", {
        style: "currency", currency: "USD", maximumFractionDigits: 0
      }).format(n);
    } catch (e) {
      return "$" + String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }
  };

  const makeCard = (item) => {
    const a = document.createElement("a");
    a.className = "card";
    a.href = item.href;
    a.setAttribute("aria-label", "Open " + item.name + " listing");
    a.innerHTML = `
      <div class="card-media">
        <img src="${item.img}" alt="${item.alt || item.name}" loading="lazy" decoding="async">
      </div>
      <div class="card-content">
        <h3>${item.name}</h3>
        <p>
          ${item.line1}<br>
          ${money(item.price)}<br>
          ${item.line2 ? item.line2 + "<br>" : ""}
          ${item.line3 ? item.line3 : ""}
        </p>
      </div>
    `;
    return a;
  };

  function render(){
    grid.innerHTML = "";

    // Sort within each type: high -> low
    const homes = listings.filter(x => x.type === "home").sort((a,b) => b.price - a.price);
    const land  = listings.filter(x => x.type === "land").sort((a,b) => b.price - a.price);

    // Render homes first
    homes.forEach(item => grid.appendChild(makeCard(item)));

    // Force a subtle separation without any headers/lines
    if (homes.length && land.length) {
      const br = document.createElement("div");
      br.className = "group-break";
      br.setAttribute("aria-hidden", "true");
      grid.appendChild(br);
    }

    // Then land
    land.forEach(item => grid.appendChild(makeCard(item)));
  }

  render();
})();
</script>

</body>
</html>
