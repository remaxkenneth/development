<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Nueva Propiedad | Kenneth Gehlhoff – RE/MAX Cabo Sanctuary</title>

  <meta name="description" content="Propiedad en El Pescadero · Baja California Sur">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#003da5">

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png">

  <style>
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:#020409;
      color:rgba(255,255,255,0.92);
    }

    header{
      position:sticky;
      top:0;
      background:rgba(245,246,247,0.92);
      backdrop-filter:blur(12px);
      border-bottom:1px solid #e5e7eb;
      z-index:50;
    }

    .nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px 5%;
    }

    .nav-left{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .nav-left img{height:32px;}
    .nav-left span{
      font-weight:700;
      letter-spacing:0.12em;
      color:#000;
      text-transform:uppercase;
    }

    .menu-button{
      font-size:28px;
      cursor:pointer;
      color:#000;
    }

    .menu-panel{
      position:absolute;
      right:18px;
      top:64px;
      background:rgba(255,255,255,0.85);
      backdrop-filter:blur(20px);
      border-radius:22px;
      padding:22px;
      display:flex;
      flex-direction:column;
      gap:16px;
      opacity:0;
      pointer-events:none;
      transition:0.25s ease;
    }

    body.menu-open .menu-panel{
      opacity:1;
      pointer-events:auto;
    }

    .menu-panel a{
      color:#000;
      text-decoration:none;
      font-size:14px;
      letter-spacing:0.1em;
      text-transform:uppercase;
    }

    #hero{
      min-height:360px;
      display:flex;
      align-items:center;
      background:#000;
      background-size:cover;
      background-position:center;
      position:relative;
    }

    #hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(130deg, rgba(0,14,53,0.7), rgba(0,0,0,0.3));
    }

    .hero-inner{
      position:relative;
      z-index:2;
      width:92%;
      max-width:1200px;
      margin:auto;
      color:#fff;
    }

    .hero-eyebrow{
      font-size:0.7rem;
      letter-spacing:0.35em;
      text-transform:uppercase;
      opacity:0.9;
    }

    .hero-title{
      font-size:2.6rem;
      margin:12px 0 0;
    }

    .hero-sub{
      margin-top:10px;
      color:#e5e7eb;
    }

    .section{
      width:92%;
      max-width:1100px;
      margin:70px auto;
    }

    .tile{
      background:rgba(0,0,0,0.55);
      border:1px solid rgba(255,255,255,0.2);
      border-radius:26px;
      padding:40px;
    }

    .slider{
      position:relative;
      overflow:hidden;
      border-radius:18px;
      height:520px;
    }

    .slider img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .arrow{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      font-size:28px;
      background:rgba(0,0,0,0.5);
      color:#fff;
      border:none;
      padding:10px 14px;
      cursor:pointer;
      border-radius:12px;
    }

    .arrow.left{left:14px;}
    .arrow.right{right:14px;}

    .price{
      text-align:center;
      font-size:2.2rem;
      margin:0;
    }

    .location{
      text-align:center;
      margin:10px 0 22px;
      text-transform:uppercase;
      letter-spacing:0.1em;
      font-size:0.85rem;
      color:rgba(255,255,255,0.7);
    }

    .stats{
      display:flex;
      justify-content:center;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:30px;
    }

    .stat{
      border:1px solid rgba(255,255,255,0.25);
      border-radius:999px;
      padding:8px 14px;
      font-size:0.8rem;
      letter-spacing:0.08em;
      text-transform:uppercase;
    }

    footer{
      text-align:center;
      padding:40px 0;
      font-size:0.8rem;
      color:#aaa;
    }
  </style>
</head>

<body>

<header>
  <div class="nav">
    <div class="nav-left">
      <a href="/index.html"><img src="/images/logo.png" alt="RE/MAX"></a>
      <span>KENNETH GEHLHOFF</span>
    </div>
    <div class="menu-button" id="menuButton">≡</div>
    <div class="menu-panel" id="menuPanel">
      <a href="/index.html">Home</a>
      <a href="/listings.html">Listings</a>
      <a href="/events.html">Events</a>
      <a href="/businesscard.html">Contact</a>
    </div>
  </div>
</header>

<section id="hero">
  <div class="hero-inner">
    <div class="hero-eyebrow">Propiedad</div>
    <h1 class="hero-title">Nueva Propiedad</h1>
    <p class="hero-sub">El Pescadero · Baja California Sur</p>
  </div>
</section>

<section class="section">
  <div class="tile">
    <div class="slider">
      <button class="arrow left" id="prev">&#10094;</button>
      <img id="slide">
      <button class="arrow right" id="next">&#10095;</button>
    </div>
  </div>
</section>

<section class="section">
  <div class="tile">
    <h2 class="price">$XXX,000 USD</h2>
    <p class="location">El Pescadero</p>

    <div class="stats">
      <div class="stat">X Recámaras</div>
      <div class="stat">X Baños</div>
      <div class="stat">Vista al mar</div>
    </div>

    <p>Descripción de la propiedad aquí.</p>
  </div>
</section>

<footer>
  © 2025 · RE/MAX Kenneth<br>
  Cada oficina es de propiedad y operación independiente
</footer>

<script>
  const menuBtn = document.getElementById("menuButton");
  const menuPanel = document.getElementById("menuPanel");

  menuBtn.onclick = e => {
    e.stopPropagation();
    document.body.classList.toggle("menu-open");
  };
  document.addEventListener("click", () => document.body.classList.remove("menu-open"));
  menuPanel.onclick = e => e.stopPropagation();

  const ORIGIN_A = "https://ldepvcutqiyf3cw0.public.blob.vercel-storage.com/c1/";

  const FILES = [
    "IMG_1071.jpeg",
    "IMG_1072.jpeg",
    "IMG_1073.jpeg",
    "IMG_1074.jpeg",
    "IMG_1075.jpeg",
    "IMG_1076.jpeg",
    "IMG_1077.jpeg",
    "IMG_1078.jpeg",
    "IMG_1079.jpeg",
    "IMG_1081.jpeg",
    "IMG_1082.jpeg",
    "IMG_1083.jpeg",
    "IMG_1086.jpeg",
    "IMG_1087.jpeg",
    "IMG_1088.jpeg"
  ];

  let index = 0;
  const img = document.getElementById("slide");
  const hero = document.getElementById("hero");

  function show(i){
    const src = ORIGIN_A + FILES[i];
    img.src = src;
    if(i === 0) hero.style.backgroundImage = `url('${src}')`;
  }

  document.getElementById("next").onclick = () => {
    index = (index + 1) % FILES.length;
    show(index);
  };

  document.getElementById("prev").onclick = () => {
    index = (index - 1 + FILES.length) % FILES.length;
    show(index);
  };

  show(index);
</script>

</body>
</html>
